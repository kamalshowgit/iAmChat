{% extends 'base/main.html' %}
{% load static %}
{% block content %}

<main>
    <section id="room-name-wrapper">
        <p>Room Tag: <span id="room-name"></span></p>
    </section>
    <p id="room-error" role="alert"></p>
    <button id="audio-unlock-btn" type="button">Enable Audio</button>

    <section id="room-layout">
        <section id="video-streams"></section>

        <aside id="chat-panel">
            <div id="chat-header">
                <h3>Room Chat</h3>
            </div>

            <div id="chat-messages"></div>

            <form id="chat-form">
                <input id="chat-input" type="text" maxlength="500" placeholder="Type a message..." autocomplete="off" />
                <button id="chat-send-btn" type="submit">Send</button>
            </form>
        </aside>
    </section>

    <section id="activities-panel">
        <h3 id="activities-title">Together Activity</h3>
        <p id="activity-description">Pick an activity to begin.</p>
        <div id="activity-actions">
            <button id="new-activity-btn" type="button">New Activity</button>
            <button id="focus-timer-btn" type="button">Start 15m Focus</button>
            <span id="focus-timer-display"></span>
        </div>
    </section>

    <section id="controls-wrapper" aria-label="Call controls">
        <button class="control-btn" id="mic-btn" type="button" aria-label="Toggle microphone" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Zm5-3a1 1 0 1 0-2 0 3 3 0 1 1-6 0 1 1 0 1 0-2 0 5 5 0 0 0 4 4.9V20H9a1 1 0 1 0 0 2h6a1 1 0 1 0 0-2h-2v-1.1A5 5 0 0 0 17 11Z"/></svg>
            <span>Mic</span>
        </button>

        <button class="control-btn" id="camera-btn" type="button" aria-label="Toggle camera" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 8V7a3 3 0 0 0-3-3H6A3 3 0 0 0 3 7v10a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3v-1l4 3a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1l-4 3Zm3 7.06-3-2.25v-1.62l3-2.25v6.12Z"/></svg>
            <span>Camera</span>
        </button>

        <button class="control-btn danger" id="leave-btn" type="button" aria-label="Leave call">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 10.3c0 1.9-2.2 3.2-3.9 2.2l-1.5-.9a1 1 0 0 0-.52-.14H8.9a1 1 0 0 0-.52.14l-1.5.9C5.2 13.5 3 12.2 3 10.3 3 7.9 7.2 6 12 6s9 1.9 9 4.3ZM9 14h6a1 1 0 1 1 0 2H9a1 1 0 1 1 0-2Z"/></svg>
            <span>Leave</span>
        </button>
    </section>
</main>


<script type="text/javascript" src="{% static 'assets/AgoraRTC_N-4.8.0.js' %}"></script>
<script type="text/javascript" src="{% static 'js/streams.js' %}" ></script>
{% endblock content %}

{% extends 'base/main.html' %}
{% load static %}
{% block content %}
<main>
    <section id="form-container">
        <img id="logo" src="{% static 'images/chat-icon.png' %}" alt="iAmChat Logo">
        <h1>Join Meeting</h1>
        <p class="subtext">Simple video call and chat for web and mobile.</p>

        <form id="form">
            <div class="field-wrapper">
                <div class="form-field">
                    <label for="room-field">Room</label>
                    <input id="room-field" name="room" placeholder="e.g. TEAMSYNC" autocomplete="off">
                </div>

                <div class="form-field">
                    <label for="name-field">Name</label>
                    <input id="name-field" name="name" placeholder="Your name" autocomplete="off">
                </div>

                <div class="form-field">
                    <input type="submit" value="Join Call">
                </div>
                <p id="form-error"></p>
            </div>
        </form>
    </section>
</main>

<script>
const form = document.getElementById('form');
const errorElement = document.getElementById('form-error');

const handleSubmit = async (e) => {
    e.preventDefault()
    const room = e.target.room.value.trim().toUpperCase()
    const name = e.target.name.value.trim()

    errorElement.style.display = 'none'
    errorElement.textContent = ''

    if (!room || !name) {
      errorElement.textContent = 'Room tag and name are required.'
      errorElement.style.display = 'block'
      return
    }

    let response;
    let data;
    try {
        response = await fetch(`/get_token/?channel=${encodeURIComponent(room)}`)
        data = await response.json()
    } catch (error) {
        errorElement.textContent = 'Network error. Please try again.'
        errorElement.style.display = 'block'
        return
    }

    if (!response.ok || !data.token || !data.uid || !data.app_id) {
        errorElement.textContent = (data && data.error) || 'Failed to connect. Please try again.'
        errorElement.style.display = 'block'
        return
    }

    sessionStorage.setItem('UID', data.uid)
    sessionStorage.setItem('token', data.token)
    sessionStorage.setItem('appId', data.app_id)
    sessionStorage.setItem('room', room)
    sessionStorage.setItem('name', name)

    window.open('/room/', '_self')
};

form.addEventListener('submit', handleSubmit);
</script>
{% endblock content %}
